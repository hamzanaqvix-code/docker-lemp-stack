services:

  nginx:
    image: nginx:1.25-alpine
    container_name: lemp_nginx
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - lemp_network
    restart: unless-stopped

  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: lemp_php
    volumes:
      - ./src:/var/www/html
    depends_on:
      - mariadb
      - redis
    networks:
      - lemp_network
    restart: unless-stopped
    env_file:
      - .env

  mariadb:
    image: mariadb:10.11
    container_name: lemp_mariadb
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - lemp_network
    restart: unless-stopped
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    container_name: lemp_redis
    networks:
      - lemp_network
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning

volumes:
  mariadb_data:
    driver: local

networks:
  lemp_network:
    driver: bridge
